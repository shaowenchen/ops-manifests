apiVersion: crd.chenshaowen.com/v1
kind: Pipeline
metadata:
  name: get-pod-logs-by-keyword
  namespace: ops-system
  labels:
    ops/copilot: enabled
spec:
  desc: query latest pod logs filtered by keyword; returns 没有查到 when no lines match
  tasks:
    - name: filter-pod-logs
      desc: tail pod logs and grep by keyword
      taskRef: get-pod-logs-by-keyword
